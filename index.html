<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文字游戏对话记录生成器</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #d1d1d1;
            --font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-size: 18px;
        }

        body { font-family: var(--font-family); background: #222; color: #eee; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 左侧控制面板 */
        #control-panel { width: 320px; min-width: 150px; max-width: 600px; padding: 20px; border-right: 1px solid #333; display: flex; flex-shrink: 0; flex-direction: column; background: rgba(0, 0, 0, 0.2); box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 10; backdrop-filter: blur(10px);}
        
        #resizer {
        position: absolute;
        right: 0;
        top: 0;
        width: 8px; /* 感应宽度 */
        height: 100%;
        cursor: col-resize; /* 鼠标悬停显示双向箭头 */
        z-index: 20;
        }
        #resizer:hover {
            background: rgba(255, 255, 255, 0.1); /* 鼠标移上去时稍微亮一下提示用户 */
        }

        .section { margin-bottom: 20px; }
        .section-title { font-size: 14px; font-weight: bold; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        
        textarea { width: 100%; flex-grow: 1; background: #111; border: 1px solid #444; color: #ccc; padding: 12px; font-size: 14px; border-radius: 4px; resize: none; line-height: 1.5; outline: none; box-sizing: border-box; }

        /* 设置项样式 */
        .setting-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        input[type="color"] { border: none; width: 40px; height: 25px; cursor: pointer; background: none; }
        input[type="range"] { width: 120px; cursor: pointer; }
        select { background: #444; color: white; border: none; padding: 4px; border-radius: 4px; width: 120px; }

        /* 右侧预览区预览区 */
        #log-view { 
            flex-grow: 1; 
            padding: 40px 10%; 
            overflow-y: auto; 
            background: var(--bg-color); 
            color: var(--text-color);
            font-family: var(--font-family);
            transition: background 0.3s, color 0.3s;
            font-size: var(--font-size);

            position: relative;
            z-index: 1; 
            background-size: cover;
            background-position: center;
        }

        #log-view::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-image); 
            background-size: cover;
            background-position: center;
            opacity: var(--bg-opacity, 0.5); 
            z-index: -1;
            pointer-events: none;
        }
        
        .log-line { padding: 15px 0; line-height: 1.6; border-bottom: 1px solid rgba(127, 127, 127, 0.25);}
        .char-name { font-weight: bold; color: inherit; filter: brightness(1.4); margin-right: 12px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<div id="control-panel">
    <div id="resizer"></div> <div class="section">
        <div class="section-title">外观设置</div>
        <div class="setting-item">
            背景颜色 <input type="color" id="bg-picker" value="#1a1a1a">
        </div>
        <div class="setting-item">
            字体颜色 <input type="color" id="text-picker" value="#d1d1d1">
        </div>
        <div class="setting-item">
            字体大小 <span id="size-val">18px</span>
            <input type="range" id="size-slider" min="12" max="40" value="18">
        </div>
        <div class="setting-item">
            字体样式 
            <select id="font-selector">
                <option value="'PingFang SC', sans-serif">默认黑体</option>
                <option value="'KaiTi', 'STKaiti', serif">楷体</option>
                <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                <option value="monospace">等宽字体</option>
                <option value="'Georgia', serif">衬线体 </option>
            </select>
        </div>
        <div class="setting-item">
            背景图片 <input type="file" id="bg-upload" accept="image/*" style="width: 140px; font-size: 12px;">
        </div>
        <div class="setting-item">
            图片透明度 <input type="range" id="bg-opacity" min="0" max="100" value="50">
        </div>
        <div class="setting-item" style="margin-top: 20px;">
            <button id="export-btn" style="width: 100%; padding: 10px; background: #8cc4e6; color: rgb(0, 0, 0); border: none; border-radius: 4px; cursor: pointer;">保存为长图</button>
        </div>
    </div>

    <div class="section" style="flex-grow: 1; display: flex; flex-direction: column;">
        <div class="section-title">内容输入</div>
        <textarea id="raw-input" placeholder="输入规则：
1. 名字 空格 句子 (自动加粗名字)
2. 纯句子 (直接显示文本)
* 不需要输入冒号"></textarea>
    </div>
</div>

<div id="log-view" id="display">
    </div>

<script>
    const input = document.getElementById('raw-input');
    const display = document.getElementById('log-view');
    const bgPicker = document.getElementById('bg-picker');
    const textPicker = document.getElementById('text-picker');
    const fontSelector = document.getElementById('font-selector');
    const sizeSlider = document.getElementById('size-slider');
    const sizeVal = document.getElementById('size-val');

    sizeSlider.addEventListener('input', (e) => {
        const val = e.target.value + 'px';
        // 更新 CSS 变量，让右侧文字变大变小
        display.style.setProperty('--font-size', val);
        // 更新左侧显示的数字（如 "18px"）
        sizeVal.innerText = val;
    });

    // 实时更新样式
        bgPicker.addEventListener('input', (e) => {
        const color = e.target.value;
        display.style.setProperty('--bg-color', color);
        
        // 逻辑：如果背景色太亮，让左边栏变得更深一点；如果背景色太深，让左边栏稍微透出一点底色
        // 简单做法：直接让 control-panel 的背景色也跟着联动
        const panel = document.getElementById('control-panel');
        panel.style.backgroundColor = color; 
        // 增加一个亮度降低滤镜，让左边栏永远比右边暗 20%
        panel.style.filter = "brightness(0.8) contrast(1.2)";
    });

    textPicker.addEventListener('input', (e) => {
        display.style.setProperty('--text-color', e.target.value);
    });

    fontSelector.addEventListener('change', (e) => {
        display.style.setProperty('--font-family', e.target.value);
    });

    // 实时处理文本
    input.addEventListener('input', () => {
        const lines = input.value.split('\n');
        display.innerHTML = ''; 

        lines.forEach(line => {
            const trimmed = line.trim();
            if (trimmed === '') return;

            const entry = document.createElement('div');
            entry.className = 'log-line';

            const spaceIndex = trimmed.indexOf(' ');
            
            if (spaceIndex !== -1) {
                const name = trimmed.substring(0, spaceIndex);
                const text = trimmed.substring(spaceIndex + 1);
                entry.innerHTML = `<span class="char-name">${name}</span><span>${text}</span>`;
            } else {
                entry.innerHTML = `<span>${trimmed}</span>`;
            }
            display.appendChild(entry);
        });
        display.scrollTop = display.scrollHeight;
    });

    const exportBtn = document.getElementById('export-btn');

    exportBtn.addEventListener('click', () => {
        const originalText = exportBtn.innerText;
        exportBtn.innerText = '正在生成全长图...';
        exportBtn.style.background = '#95a5a6';

        // 核心改动：设置 scrollY 为 0，并手动指定渲染的高度为内容的实际高度（scrollHeight）
        html2canvas(display, {
            backgroundColor: getComputedStyle(display).getPropertyValue('--bg-color'),
            scale: 2, 
            useCORS: true,
            height: display.scrollHeight, // 捕捉元素的总高度，包含滚动区域
            windowHeight: display.scrollHeight, 
            y: 0, // 从顶部开始截取
            scrollX: 0,
            scrollY: 0,
            onclone: (clonedDoc) => {
                // 在克隆出的文档中，把滚动区域的高度撑开，确保内容不被裁剪
                const clonedDisplay = clonedDoc.getElementById('log-view');
                clonedDisplay.style.overflow = 'visible';
                clonedDisplay.style.height = 'auto';
            }
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = '对话历史长图.png';
            link.href = canvas.toDataURL('image/png');
            link.click();

            exportBtn.innerText = originalText;
            exportBtn.style.background = '#3498db';
        });
    });

    const panel = document.getElementById('control-panel');
    const resizer = document.getElementById('resizer');

    resizer.addEventListener('mousedown', (e) => {
        // 阻止文字选中干扰拖拽
        e.preventDefault();
        
        document.addEventListener('mousemove', resize);
        document.addEventListener('mouseup', stopResize);
        
        // 给 body 加个类，防止拖动时鼠标指针闪烁或跳变
        document.body.style.cursor = 'col-resize';
    });

    function resize(e) {
        // 设置边栏宽度为鼠标当前 X 坐标
        const newWidth = e.clientX;
        if (newWidth >= 150 && newWidth <= 600) {
            panel.style.width = newWidth + 'px';
        }
    }

    function stopResize() {
        document.removeEventListener('mousemove', resize);
        document.removeEventListener('mouseup', stopResize);
        document.body.style.cursor = 'default';
    }

    const bgUpload = document.getElementById('bg-upload');
    const bgOpacity = document.getElementById('bg-opacity');

    // 上传并设置预览
    bgUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                // 将图片转为 Base64 设为 CSS 变量
                display.style.setProperty('--bg-image', `url(${event.target.result})`);
            };
            reader.readAsDataURL(file);
        }
    });

    // 调节透明度
    bgOpacity.addEventListener('input', (e) => {
        // 找到预览区的 before 伪元素修改透明度
        // 或者直接修改整个预览区的亮度/透明度倾向
        display.style.setProperty('--bg-opacity', e.target.value / 100);
    });

</script>

</body>
</html>
